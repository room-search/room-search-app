name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.7'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore (optional)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p android/app/keystore
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore/release.jks
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve share env
        id: share_env
        env:
          LANDING_BASE_URL_VAR: ${{ vars.LANDING_BASE_URL }}
        run: |
          LANDING="${LANDING_BASE_URL_VAR:-https://room-search.github.io}"
          echo "landing=$LANDING" >> "$GITHUB_OUTPUT"

      - name: Build signed APK
        if: steps.keystore.outputs.present == 'true'
        env:
          RELEASE_STORE_FILE: keystore/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KAKAO_NATIVE_APP_KEY: ${{ secrets.KAKAO_NATIVE_APP_KEY }}
          LANDING_BASE_URL: ${{ steps.share_env.outputs.landing }}
          APP_SCHEME: roomsearch
        run: |
          flutter build apk --release \
            --build-name=${{ steps.tag.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define=KAKAO_NATIVE_APP_KEY="$KAKAO_NATIVE_APP_KEY" \
            --dart-define=LANDING_BASE_URL="$LANDING_BASE_URL" \
            --dart-define=APP_SCHEME="$APP_SCHEME"

      - name: Build debug-signed APK (fallback)
        if: steps.keystore.outputs.present == 'false'
        env:
          KAKAO_NATIVE_APP_KEY: ${{ secrets.KAKAO_NATIVE_APP_KEY }}
          LANDING_BASE_URL: ${{ steps.share_env.outputs.landing }}
          APP_SCHEME: roomsearch
        run: |
          flutter build apk --release \
            --build-name=${{ steps.tag.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define=KAKAO_NATIVE_APP_KEY="$KAKAO_NATIVE_APP_KEY" \
            --dart-define=LANDING_BASE_URL="$LANDING_BASE_URL" \
            --dart-define=APP_SCHEME="$APP_SCHEME"

      - name: Rename artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/room-search-${{ steps.tag.outputs.tag }}.apk

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/room-search-${{ steps.tag.outputs.tag }}.apk
