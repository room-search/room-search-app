name: room_search
description: "방서치 - 방탈출 테마/카페 검색 앱"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Networking
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^6.1.5

  # Local storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  shared_preferences: ^2.5.5

  # UI / images / animations
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  lottie: ^3.3.3
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  skeletonizer: ^2.1.3
  google_fonts: ^8.0.2

  # Map
  flutter_naver_map: ^1.4.4
  geolocator: ^13.0.4

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.2
  logger: ^2.7.0
  collection: ^1.19.1
  path_provider: ^2.1.5

  # Update / install
  package_info_plus: ^8.1.2
  open_filex: ^4.5.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon_transparent.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
